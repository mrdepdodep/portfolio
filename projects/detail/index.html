    "@context": "https://schema.org",

      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://mrdepdodep.github.io/portfolio/" },
        { "@type": "ListItem", "position": 2, "name": "Projects", "item": "https://mrdepdodep.github.io/portfolio/projects/" },

<body class="project-detail-page">
  <div class="toast" id="toast" role="alert" aria-live="polite" aria-atomic="true"></div>

  <a href="../" class="back-button" aria-label="Go back to projects page" data-i18n-attr="aria-label:a11y.backProjects">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M19 12H5M12 19l-7-7 7-7" />
    </svg>
    <span data-i18n="projects.back">Back</span>
  </a>

  <nav class="nav scrolled" role="navigation" aria-label="Main navigation" data-i18n-attr="aria-label:a11y.mainNavigation">
    <div class="container nav-container">
      <a href="../../" class="logo" aria-label="Mr Dep Dodep - Home" data-i18n-attr="aria-label:a11y.logoHome">Mr Dep Dodep</a>
      <ul class="nav-menu">
        <li><a href="../../about/" class="nav-link" data-i18n="nav.about">About</a></li>
        <li><a href="../../#contact" class="nav-link" data-i18n="nav.contact">Contact</a></li>
        <li><a href="../" class="nav-link active" aria-current="page" data-i18n="nav.projects">Projects</a></li>
        <li>
          <a href="#" class="nav-link nav-soon" data-soon-link>
            <span data-i18n="nav.reviews">Reviews</span>
            <span class="soon-tag" aria-hidden="true" data-i18n="common.soon">Soon</span>
          </a>
        </li>
        <li class="language-switcher">
          <button class="lang-btn" id="currentLang" aria-label="Select language" aria-haspopup="true" aria-expanded="false" data-i18n-attr="aria-label:a11y.selectLanguage">
            <span class="flag" aria-hidden="true">🇬🇧</span>
          </button>
          <div class="lang-dropdown" id="langDropdown" role="menu">
            <button class="lang-option" data-lang="en" role="menuitem"><span class="flag" aria-hidden="true">🇬🇧</span><span>English</span></button>
            <button class="lang-option" data-lang="uk" role="menuitem"><span class="flag" aria-hidden="true">🇺🇦</span><span>Українська</span></button>
            <button class="lang-option" data-lang="ru" role="menuitem"><span class="flag" aria-hidden="true">🇷🇺</span><span>Русский</span></button>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <main id="main-content">
    <section class="project-detail is-loading" data-detail-shell>
      <div class="container">

        <div class="project-hero-card">
          <article class="project-gallery" data-project-gallery>
            <div class="project-gallery-main">
              <img class="project-gallery-image" data-gallery-main src="" alt="" loading="lazy" width="16" height="10" />
              <button class="project-gallery-control prev" data-gallery-prev type="button" aria-label="Previous image" data-i18n-attr="aria-label:a11y.gallery.prevImage">‹</button>
              <button class="project-gallery-control next" data-gallery-next type="button" aria-label="Next image" data-i18n-attr="aria-label:a11y.gallery.nextImage">›</button>
              <button class="project-gallery-fullscreen" data-gallery-fullscreen type="button" data-i18n="projects.detail.fullscreen">Fullscreen</button>
            </div>
            <div class="project-gallery-thumbs" data-gallery-thumbs></div>
          </article>

          <aside class="project-header">
            <h1 class="project-detail-title" data-project-field="title"></h1>
            <p class="project-detail-description" data-project-field="description"></p>

            <div class="project-inline-skills">
              <div class="project-skills-list" data-project-skills></div>
            </div>

            <div class="project-hero-actions">
              <a class="project-action-btn" data-project-code href="#" target="_blank" rel="noopener" data-i18n="projects.detail.viewCode">View Code</a>
              <a class="project-action-btn primary" data-project-live href="#" target="_blank" rel="noopener" data-i18n="projects.detail.openProject">Open Project</a>
            </div>
          </aside>
        </div>

        <div class="project-lower-grid">
          <article class="project-readme-card">
            <h2 class="project-panel-title" data-i18n="projects.detail.readmeTitle">README</h2>
            <div class="project-readme-content" data-readme-target data-i18n="projects.detail.loadingReadme">Loading README...</div>
          </article>

          <aside class="project-meta-card">
            <section>
              <h2 class="project-panel-title" data-i18n="projects.detail.fullDescriptionTitle">Full Project Description</h2>
              <p class="project-meta-text" data-project-field="fullDescription"></p>
            </section>
            <section>
              <h2 class="project-panel-title" data-i18n="projects.detail.keyPointsTitle">Advantages / Challenges</h2>
              <ul class="project-points" data-project-points></ul>
            </section>
          </aside>
        </div>

      </div>
    </section>
  </main>

  <div class="gallery-modal" data-gallery-modal role="dialog" aria-modal="true" aria-label="Project image viewer" hidden>
    <div class="gallery-modal-content" tabindex="-1">
      <button class="gallery-modal-close" data-modal-close type="button" aria-label="Close fullscreen" data-i18n-attr="aria-label:a11y.gallery.closeFullscreen">×</button>
      <img class="gallery-modal-image" data-modal-image src="" alt="Fullscreen preview" loading="lazy" width="16" height="10" />
      <button class="gallery-modal-control prev" data-modal-prev type="button" aria-label="Previous image" data-i18n-attr="aria-label:a11y.gallery.prevImage">‹</button>
      <button class="gallery-modal-control next" data-modal-next type="button" aria-label="Next image" data-i18n-attr="aria-label:a11y.gallery.nextImage">›</button>
    </div>
  </div>
  <script src="../../src/js/main.js" defer></script>
  <script src="../../src/js/project-detail.js" defer></script>

</html>
