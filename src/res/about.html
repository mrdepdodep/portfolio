<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to About | Mr Dep Portfolio</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://mrdepdodep.github.io/portfolio/about/" />
  <script>
    const base = window.location.pathname.startsWith('/portfolio/') ? '/portfolio' : '';
    window.location.replace(`${base}/about/`);
  </script>
</head>
<body>
  <p>Redirecting to <a href="/about/">/about/</a>...</p>
</body>
</html>
