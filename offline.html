<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | Mr Dep Portfolio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="./src/css/main.css" />
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .offline-card {
      max-width: 560px;
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-visible);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
    }
    .offline-card h1 { margin-bottom: 12px; }
    .offline-card p { color: var(--text-secondary); margin-bottom: 18px; }
    .offline-card a {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-visible);
      text-decoration: none;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <main class="offline-card" aria-labelledby="offline-title">
    <h1 id="offline-title">You are offline</h1>
    <p>The connection is unavailable right now. Try again when network access is restored.</p>
    <a href="./">Go to Home</a>
  </main>
</body>
</html>
